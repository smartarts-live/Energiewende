<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Energiewende: Fakten vs. Mythen</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

    <style>
        html, body {
            position: relative;
            height: 100%;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #121212; /* Dunkler Hintergrund */
            color: #ffffff;
        }

        /* Der Haupt-Container füllt den ganzen Bildschirm */
        .swiper {
            width: 100%;
            height: 100%;
        }

        /* Styling der einzelnen Slides */
        .swiper-slide {
            text-align: center;
            font-size: 18px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }

        /* Beispiel-Klassen für deine Texte */
        .slide-title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #4CAF50; /* Grün für das Thema */
        }

        .slide-text {
            font-size: 16px;
            line-height: 1.5;
            max-width: 400px;
        }
    </style>
</head>
<body>

    <div class="swiper mySwiper">
        <div class="swiper-wrapper">
            
            <div class="swiper-slide">
                <div class="slide-title">Titel für Slide 1 hier einfügen</div>
                <div class="slide-text">Hier kommt dein Text für den ersten Slide rein.</div>
            </div>

            <div class="swiper-slide">
                <div class="slide-title">Titel für Slide 2 hier einfügen</div>
                <div class="slide-text">Hier kommt dein Text für den zweiten Slide rein.</div>
            </div>

            <div class="swiper-slide">
                <div class="slide-title">Titel für Slide 3 hier einfügen</div>
                <div class="slide-text">Hier kommt dein Text für den dritten Slide rein.</div>
            </div>

            </div>
        
        <div class="swiper-pagination"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

    <script>
        var swiper = new Swiper(".mySwiper", {
            direction: "horizontal", /* Wischrichtung: horizontal oder vertical */
            loop: false, /* 'true' für Endlos-Wischen, 'false' für Stopp am letzten Slide */
            pagination: {
                el: ".swiper-pagination",
                clickable: true, /* Erlaubt das Klicken auf die Punkte */
            },
        });
    </script>
</body>
</html>
